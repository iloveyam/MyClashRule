[general]
; 基础设置
mixed-port=7890
allow-lan=true
mode=Rule
log-level=info
ipv6=true
external-controller=9999
external-ui=ui

; DNS 优化 (针对 IPv6 修复)
dns-enable=true
dns-ipv6=true
dns-enhanced-mode=fake-ip
dns-fake-ip-range=198.18.0.1/16
dns-fake-ip-range6=fc00::/16
dns-nameserver=https://dns.alidns.com/dns-query, https://doh.pub/dns-query, 8.8.8.8
dns-fallback=https://1.1.1.1/dns-query, https://8.8.8.8/dns-query

[proxy_group]
; --- 1. 功能分组 (置顶) ---
🧪 IPv6 测试:select, []proxy, url=http://ipv6.google.com/generate_204, interval=300
🚀 默认代理:select, 🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🌐 全部节点, DIRECT
🤖 AI:select, 🔯 美国故转, 🔯 日本故转, 🔯 狮城故转, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, ♻️ 自动选择, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🌐 全部节点
🍀 Google:select, 🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, DIRECT
📹 YouTube:select, 🔯 香港故转, 🔯 美国故转, 🔯 日本故转, 🔯 狮城故转, ♻️ 自动选择, 🇭🇰 香港节点, 🇺🇲 美国节点, 🌐 全部节点
🎥 NETFLIX:select, 🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🌐 全部节点, DIRECT
🎬 Emby:select, 🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🌐 全部节点, DIRECT
🍎 苹果服务:select, DIRECT, 🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🌐 全部节点
👨🏿‍💻 GitHub:select, 🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🌐 全部节点, DIRECT
📲 Telegram:select, 🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🌐 全部节点
🐟 漏网之鱼:select, 🚀 默认代理, DIRECT

; --- 2. 节点筛选 (基于你的节点名关键字) ---
🇭🇰 香港节点:select, []proxy, filter=(?i)港|HK|Hong
🇯🇵 日本节点:select, []proxy, filter=(?i)日|JP|Japan
🇸🇬 狮城节点:select, []proxy, filter=(?i)新|SG|Singapore
🇺🇲 美国节点:select, []proxy, filter=(?i)美|US|States
🔯 香港故转:fallback, []proxy, filter=(?i)港|HK|Hong, url=http://www.gstatic.com/generate_204, interval=300
🔯 日本故转:fallback, []proxy, filter=(?i)日|JP|Japan, url=http://www.gstatic.com/generate_204, interval=300
🔯 狮城故转:fallback, []proxy, filter=(?i)新|SG|Singapore, url=http://www.gstatic.com/generate_204, interval=300
🔯 美国故转:fallback, []proxy, filter=(?i)美|US|States, url=http://www.gstatic.com/generate_204, interval=300
♻️ 日本自动:url-test, []proxy, filter=(?i)日|JP|Japan, tolerance=20, interval=1800
♻️ 狮城自动:url-test, []proxy, filter=(?i)新|SG|Singapore, tolerance=20, interval=1800
♻️ 美国自动:url-test, []proxy, filter=(?i)美|US|States, tolerance=20, interval=1800
♻️ 自动选择:url-test, []proxy, tolerance=20, interval=1800
🌐 全部节点:select, []proxy

[rule]
; --- 优先级 1: IPv6 强制测试 ---
DOMAIN,ipv6.google.com,🧪 IPv6 测试

; --- 优先级 2: 自定义直连 ---
DOMAIN-SUFFIX,xxttq.com,DIRECT
DOMAIN-SUFFIX,beupisp.com,DIRECT

; --- 优先级 3: 核心规则集 (转换器会自动转为 mrs/list) ---
RULE-SET,ai,🤖 AI
RULE-SET,youtube,📹 YouTube
RULE-SET,google,🍀 Google
RULE-SET,github,👨🏿‍💻 GitHub
RULE-SET,telegram,📲 Telegram
RULE-SET,netflix,🎥 NETFLIX
RULE-SET,emby,🎬 Emby
RULE-SET,apple,🍎 苹果服务

; --- 优先级 4: 基础分流 ---
RULE-SET,proxylite,🚀 默认代理
RULE-SET,cn,DIRECT
GEOIP,CN,DIRECT,no-resolve
MATCH,🐟 漏网之鱼
