# 机场订阅
proxy-providers:
  MyAirport:
    url: "你的订阅链接" # 请在此处填入你的订阅链接
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT

# 全局配置 
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站
tun:
  enable: true
  stack: system # 个人建议 system 兼容性更好
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-detect-interface: true

# DNS 模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query

# 出站策略
proxy-groups:
  - {name: 🧪 IPv6 测试, type: url-test, use: [MyAirport], url: "http://ipv6.google.com/generate_204", interval: 1800, tolerance: 50}
  
  - {name: 🚀 默认代理, type: select, proxies: [🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🌐 全部节点, DIRECT]}
  
  - {name: 🤖 AI, type: select, proxies: [🔯 美国故转, 🔯 日本故转, 🔯 狮城故转, ♻️ 日本自动, ♻️ 狮城自动, ♻️ 美国自动, ♻️ 自动选择, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🌐 全部节点]}
  
  - {name: 📹 YouTube, type: select, proxies: [🔯 香港故转, 🔯 美国故转, ♻️ 香港自动, ♻️ 美国自动, ♻️ 自动选择, 🇭🇰 香港节点, 🇺🇲 美国节点, 🌐 全部节点]}
  
  - {name: 🍀 Google, type: select, proxies: [🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, DIRECT]}
  
  - {name: 👨🏿‍💻 GitHub, type: select, proxies: [🔯 香港故转, 🔯 日本故转, 🔯 美国故转, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇺🇲 美国节点, DIRECT]}
  
  - {name: 🍎 苹果服务, type: select, proxies: [DIRECT, 🚀 默认代理, 🔯 香港故转, 🌐 全部节点]}

  - {name: 📲 Telegram, type: select, proxies: [🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🌐 全部节点]}

  - {name: 🎥 NETFLIX, type: select, proxies: [🔯 狮城故转, 🔯 香港故转, 🔯 日本故转, 🔯 美国故转, ♻️ 自动选择, 🇸🇬 狮城节点, 🇭🇰 香港节点]}

  - {name: 🎬 Emby, type: select, proxies: [🔯 香港故转, 🔯 美国故转, ♻️ 自动选择, 🇭🇰 香港节点, DIRECT]}

  - {name: 🐬 OneDrive, type: select, proxies: [DIRECT, 🪟 Microsoft]}

  - {name: 🪟 Microsoft, type: select, proxies: [DIRECT, 🔯 日本故转, 🔯 香港故转, ♻️ 自动选择, 🌐 全部节点]}

  - {name: 🎵 TikTok, type: select, proxies: [🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点]}

  - {name: 🎵 Spotify, type: select, proxies: [🔯 美国故转, 🔯 狮城故转, 🔯 香港故转, ♻️ 自动选择, 🌐 全部节点, DIRECT]}

  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 默认代理, DIRECT]}

  # --- 节点自动筛选 (使用 include-all 引用提供者) ---
  - {name: 🇭🇰 香港节点, type: select, use: [MyAirport], filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: 🇯🇵 日本节点, type: select, use: [MyAirport], filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  - {name: 🇸🇬 狮城节点, type: select, use: [MyAirport], filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$"}
  - {name: 🇺🇲 美国节点, type: select, use: [MyAirport], filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$"}
  - {name: 🔯 香港故转, type: fallback, use: [MyAirport], interval: 300, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: 🔯 日本故转, type: fallback, use: [MyAirport], interval: 300, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  - {name: 🔯 狮城故转, type: fallback, use: [MyAirport], interval: 300, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$"}
  - {name: 🔯 美国故转, type: fallback, use: [MyAirport], interval: 300, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$"}
  - {name: ♻️ 香港自动, type: url-test, use: [MyAirport], tolerance: 20, interval: 1800, filter: "(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$"}
  - {name: ♻️ 日本自动, type: url-test, use: [MyAirport], tolerance: 20, interval: 1800, filter: "(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$"}
  - {name: ♻️ 狮城自动, type: url-test, use: [MyAirport], tolerance: 20, interval: 1800, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(港|台|韩|日|美)).)*$"}
  - {name: ♻️ 美国自动, type: url-test, use: [MyAirport], tolerance: 20, interval: 1800, filter: "(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$"}
  - {name: ♻️ 自动选择, type: url-test, use: [MyAirport], tolerance: 20, interval: 1800, filter: "^((?!(DIRECT)).)*$"}
  - {name: 🌐 全部节点, type: select, use: [MyAirport]}

# 规则匹配
rules:
  - DOMAIN-SUFFIX,xxttq.com,DIRECT
  - DOMAIN-SUFFIX,beupisp.com,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,private_domain,DIRECT
  
  # 高优先级
  - RULE-SET,ai,🤖 AI
  
  # 海外基础
  - RULE-SET,github_domain,👨🏿‍💻 GitHub
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,google_domain,🍀 Google
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,spotify_domain,🎵 Spotify
  - RULE-SET,tiktok_domain,🎵 TikTok
  - RULE-SET,emby_domain,🎬 Emby

  # 办公系统
  - RULE-SET,onedrive_domain,🐬 OneDrive
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,apple_domain,🍎 苹果服务
  
  # IP 分流
  - RULE-SET,google_ip,🍀 Google
  - RULE-SET,netflix_ip,🎥 NETFLIX
  - RULE-SET,telegram_ip,📲 Telegram
  - RULE-SET,apple_ip,🍎 苹果服务
  
  # 其他海外流量
  - RULE-SET,proxylite,🚀 默认代理
  - RULE-SET,geolocation-!cn,🚀 默认代理
  
  # 国内直连
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT
  
  - MATCH,🐟 漏网之鱼

# 规则集定义 (保持原版引用链接)
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

rule-providers: 
  fakeipfilter_domain: {<<: *domain, url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"}
