[custom]
; ===================================================
; 1. 策略组配置 (由下至上构建逻辑)
; ===================================================

; --- 01. 基础筛选与自动选择组 (底层) ---
custom_proxy_group=🌐 全部节点`select`.*
custom_proxy_group=♻️ 自动选择`url-test`^((?!(DIRECT)).)*$`http://www.google.com/generate_204`1800`20
custom_proxy_group=🧪 IPv6 测试`url-test`.*`http://ipv6.google.com/generate_204`800`50

; --- 02. 地区筛选逻辑组 (包含 故转/自动/手动) ---
; 香港
custom_proxy_group=🇭🇰 香港节点`select`(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$
custom_proxy_group=🔯 香港故转`fallback`(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$`http://www.google.com/generate_204`300
custom_proxy_group=♻️ 香港自动`url-test`(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$`http://www.google.com/generate_204`1800`20

; 日本
custom_proxy_group=🇯🇵 日本节点`select`(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$
custom_proxy_group=🔯 日本故转`fallback`(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$`http://www.google.com/generate_204`300
custom_proxy_group=♻️ 日本自动`url-test`(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美)).)*$`http://www.google.com/generate_204`1800`20

; 狮城
custom_proxy_group=🇸🇬 狮城节点`select`(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$
custom_proxy_group=🔯 狮城故转`fallback`(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$`http://www.google.com/generate_204`300
custom_proxy_group=♻️ 狮城自动`url-test`(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(港|台|韩|日|美)).)*$`http://www.google.com/generate_204`1800`20

; 美国
custom_proxy_group=🇺🇲 美国节点`select`(?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$
custom_proxy_group=🔯 美国故转`fallback`(?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$`http://www.google.com/generate_204`300
custom_proxy_group=♻️ 美国自动`url-test`(?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$`http://www.google.com/generate_204`1800`20

; --- 03. 核心主入口 ---
custom_proxy_group=🚀 默认代理`select`[]🔯 香港故转`[]🔯 日本故转`[]🔯 狮城故转`[]🔯 美国故转`[]♻️ 香港自动`[]♻️ 日本自动`[]♻️ 狮城自动`[]♻️ 美国自动`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇺🇲 美国节点`[]🌐 全部节点`[]DIRECT

