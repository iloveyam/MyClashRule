[common]
# 基础配置
api_mode=false
default_group=🚀 默认代理
exclude_remarks=(到期|剩余|流量|时间|官网|产品)

# 核心开关：确保转换后生成符合 Mihomo (Meta) 内核的字段
enable_rule_generator=true
overwrite_original_rules=true
clash_use_new_field_name=true

[user_defined]

