# ===================================================
# Mihomo (Clash Meta) 逻辑修复版 - 解决 DNS 劫持导致的上传失败
# 核心逻辑：Fake-IP 强制接管 + 远程 DoH 纯净解析
# ===================================================

# 1. 机场订阅
proxy-providers:
  Airport1:
    url: "你的订阅链接" # 请填入
    type: http
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT

# 2. 全局基础配置
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false # 逻辑：关闭 IPv6 减少 DNS 解析双栈干扰
unified-delay: true
tcp-concurrent: false # 逻辑：关闭并发，防止部分节点握手失败
log-level: info
global-client-fingerprint: chrome

profile:
  store-selected: true
  store-fake-ip: true

# 3. 嗅探逻辑：解决劫持的关键
# 逻辑：在 Fake-IP 下，sniffer 负责还原真实的域名并匹配规则
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true 
    TLS:
      ports: [443, 8443]
      override-destination: true
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 4. 入站设置
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-detect-interface: true

# 5. DNS 模块：这是修复你日志报错的核心
# 逻辑：切回 fake-ip 并使用 respect-rules，强制让 DNS 请求也走代理通道
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true       # 逻辑：让 DNS 遵循规则分流，防止解析请求被运营商拦截
  enhanced-mode: fake-ip    # 逻辑：用 Fake-IP 避开本地污染
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.direct"
    - "+.msftncsi.com" # 防止 Windows 网络状态检测异常
  default-nameserver:
    - 223.5.5.5
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query # 阿里加密 DNS，防止被劫持成“斗鱼”

# 6. 出站策略组 (保持你的原有排序)
