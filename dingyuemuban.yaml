# Clash Meta (Mihomo) 完整整合版

proxy-providers:
  Airport1:
    url: "你的订阅链接"
    type: http
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT

mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
profile:
  store-selected: true
  store-fake-ip: true

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-detect-interface: true

# DNS 模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
    - "+.lan"
    - "+.local"
  
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver-policy:
    "geosite:cn,private": [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
    "geosite:geolocation-!cn": [https://8.8.8.8/dns-query, https://1.1.1.1/dns-query]
  
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://8.8.8.8/dns-query

# 出站策略
proxy-groups:
  # IPv6 专属组：改为 url-test，会自动剔除连不通 ipv6.google.com 的节点
  - {name: 🧪 IPv6 自动优选, type: url-test, include-all: true, url: "https://ipv6.google.com/generate_204", interval: 3600, tolerance: 50}
  
  - {name: 🚀 默认代理, type: select, proxies: [🔯 香港故转, 🔯 日本故转, 🔯 狮城故转, 🔯 美国故转, ♻️ 自动选择, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇸🇬 狮城节点, 🇺🇲 美国节点, 🌐 全部节点, DIRECT]}
  
  - {name: 🤖 AI, type: select, proxies: [🔯 美国故转, 🔯 日本故转, 🔯 狮城故转, ♻️ 美国自动, ♻️ 日本自动, 🇺🇲 美国节点, 🇯🇵 日本节点, 🌐 全部节点]}
  
  - {name: 📹 YouTube, type: select, proxies: [🚀 默认代理, 🔯 香港故转, 🔯 日本故转, 🔯 美国故转, 🇭🇰 香港节点, 🇯🇵 日本节点, 🇺🇲 美国节点]}
  
  - {name: 🍎 Apple, type: select, proxies: [DIRECT, 🚀 默认代理, 🔯 香港故转, 🌐 全部节点]}
  
  - {name: 📲 Telegram, type: select, proxies: [🚀 默认代理, 🔯 香港故转, 🔯 狮城故转, 🇸🇬 狮城节点, 🇭🇰 香港节点]}
  
  - {name: 🎥 NETFLIX, type: select, proxies: [🔯 狮城故转, 🔯 日本故转, 🔯 美国故转, 🇸🇬 狮城节点, 🇯🇵 日本节点, 🇺🇲 美国节点]}
  
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 默认代理, DIRECT]}

  - {name: 🇭🇰 香港节点, type: select, include-all: true, filter: "(?i)(港|HK|Hong Kong)"}
  
  - {name: 🇯🇵 日本节点, type: select, include-all: true, filter: "(?i)^(?!.*(Nig|Nigeria)).*(日|JP|Japan)"}
  
  - {name: 🇸🇬 狮城节点, type: select, include-all: true, filter: "(?i)(新|坡|狮城|SG|Singapore)"}
  
  - {name: 🇺🇲 美国节点, type: select, include-all: true, filter: "(?i)(美|US|United States|America)"}

  # --- 自动测速/故障转移组 ---
  - {name: 🔯 香港故转, type: fallback, include-all: true, url: "https://www.gstatic.com/generate_204", interval: 300, filter: "(?i)(港|HK|Hong Kong)"}
  - {name: 🔯 日本故转, type: fallback, include-all: true, url: "https://www.gstatic.com/generate_204", interval: 300, filter: "(?i)^(?!.*(Nig|Nigeria)).*(日|JP|Japan)"}
  - {name: 🔯 狮城故转, type: fallback, include-all: true, url: "https://www.gstatic.com/generate_204", interval: 300, filter: "(?i)(新|坡|狮城|SG|Singapore)"}
  - {name: 🔯 美国故转, type: fallback, include-all: true, url: "https://www.gstatic.com/generate_204", interval: 300, filter: "(?i)(美|US|United States|America)"}

  - {name: ♻️ 美国自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?i)(美|US|United States|America)"}
  - {name: ♻️ 日本自动, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?i)^(?!.*(Nig|Nigeria)).*(日|JP|Japan)"}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "^((?!(DIRECT)).)*$"}
  
  - {name: 🌐 全部节点, type: select, include-all: true}

# 规则匹配
rules:
  - DOMAIN-SUFFIX,xxttq.com,DIRECT
  - DOMAIN-SUFFIX,beupisp.com,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,private_domain,DIRECT
  - RULE-SET,ai,🤖 AI
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,apple_domain,🍎 Apple
  - RULE-SET,apple_ip,🍎 Apple
  - RULE-SET,telegram_ip,📲 Telegram
  - RULE-SET,netflix_ip,🎥 NETFLIX
  - RULE-SET,geolocation-!cn,🚀 默认代理
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT
  - MATCH,🐟 漏网之鱼

# 规则集定义
rule-providers: 
  fakeipfilter_domain: {type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"}
  private_domain: {type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}
  ai: {type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs"}
  youtube_domain: {type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"}
  telegram_domain: {type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs"}
  netflix_domain: {type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs"}
  apple_domain: {type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/apple.mrs"}
  geolocation-!cn: {type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs"}
  cn_domain: {type: http, interval: 86400, behavior: domain, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"}
  
  private_ip: {type: http, interval: 86400, behavior: ipcidr, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"}
  cn_ip: {type: http, interval: 86400, behavior: ipcidr, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"}
  telegram_ip: {type: http, interval: 86400, behavior: ipcidr, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/telegram.mrs"}
  netflix_ip: {type: http, interval: 86400, behavior: ipcidr, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/netflix.mrs"}
  apple_ip: {type: http, interval: 86400, behavior: ipcidr, format: mrs, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta-lite/geoip/apple.mrs"}
