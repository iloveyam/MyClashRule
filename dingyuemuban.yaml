      - 🌐 全部节点
  - name: 🐬 OneDrive
    type: select
    proxies:
      - DIRECT
      - 🚀 默认代理
      - 🔯 香港故转
      - 🔯 日本故转
      - 🔯 狮城故转
      - 🔯 美国故转
      - 🌐 全部节点
  - name: 🪟 Microsoft
    type: select
    proxies:
      - DIRECT
      - 🚀 默认代理
      - 🔯 香港故转
      - 🔯 日本故转
      - 🔯 狮城故转
      - 🔯 美国故转
      - 🌐 全部节点
  - name: 🎵 TikTok
    type: select
    proxies:
      - 🔯 日本故转
      - 🔯 狮城故转
      - 🔯 美国故转
      - ♻️ 香港自动
      - ♻️ 日本自动
      - ♻️ 狮城自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🌐 全部节点
      - DIRECT
  - name: 📲 Telegram
    type: select
    proxies:
      - 🔯 香港故转
      - 🔯 日本故转
      - 🔯 狮城故转
      - 🔯 美国故转
      - ♻️ 香港自动
      - ♻️ 日本自动
      - ♻️ 狮城自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🌐 全部节点
      - DIRECT
  - name: 🎥 NETFLIX
    type: select
    proxies:
      - 🔯 狮城故转
      - 🔯 香港故转
      - 🔯 日本故转
      - 🔯 美国故转
      - ♻️ 香港自动
      - ♻️ 日本自动
      - ♻️ 狮城自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🌐 全部节点
      - DIRECT
  - name: 🎵 Spotify
    type: select
    proxies:
      - 🔯 美国故转
      - 🔯 狮城故转
      - 🔯 香港故转
      - 🔯 日本故转
      - ♻️ 自动选择
      - 🌐 全部节点
  - name: 🎬 Emby
    type: select
    proxies:
      - 🔯 香港故转
      - 🔯 日本故转
      - 🔯 狮城故转
      - 🔯 美国故转
      - 🚀 默认代理
      - 🌐 全部节点
      - DIRECT
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 默认代理
      - 🔯 香港故转
      - 🔯 日本故转
      - 🔯 狮城故转
      - 🔯 美国故转
      - ♻️ 香港自动
      - ♻️ 日本自动
      - ♻️ 狮城自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🌐 全部节点
      - DIRECT
  - name: 🇭🇰 香港节点
    type: select
    include-all: true
    filter: (?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$
  - name: 🇯🇵 日本节点
    type: select
    include-all: true
    filter: ^((?!(尼日利亚|Nig|Nigeria)).)*(日本|JP|Japan)((?!(港|台|韩|新|美)).)*$
  - name: 🇸🇬 狮城节点
    type: select
    include-all: true
    filter: (?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$
  - name: 🇺🇲 美国节点
    type: select
    include-all: true
    filter: (?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$
  - name: 🔯 香港故转
    type: fallback
    include-all: true
    interval: 300
    filter: (?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$
  - name: 🔯 日本故转
    type: fallback
    include-all: true
    interval: 300
    filter: ^((?!(尼日利亚|Nig|Nigeria)).)*(日本|JP|Japan)((?!(港|台|韩|新|美)).)*$
  - name: 🔯 狮城故转
    type: fallback
    include-all: true
    interval: 300
    filter: (?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(台|日|韩|深|美)).)*$
  - name: 🔯 美国故转
    type: fallback
    include-all: true
    interval: 300
    filter: (?=.*(美|US|(?i)States|America))^((?!(港|台|韩|新|日)).)*$
  - name: ♻️ 香港自动
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: (?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美)).)*$
  - name: ♻️ 日本自动
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: (?i)^((?!(Nig|NG|Nigeria)).)*(日|JP|Japan)((?!(港|台|韩|新|美)).)*$
  - name: ♻️ 狮城自动
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: (?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(港|台|韩|日|美)).)*$
  - name: ♻️ 美国自动
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: (?=.*(美|US|(?i)States|America))^((?!(港|台|日|韩|新)).)*$
  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    tolerance: 20
    interval: 300
    filter: ^((?!(DIRECT)).)*$
  - name: 🌐 全部节点
    type: select
    include-all: true
rules:
  - DOMAIN-SUFFIX,xxttq.com,DIRECT
  - DOMAIN-SUFFIX,beupisp.com,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,private_domain,DIRECT
  - DOMAIN-SUFFIX,events.data.microsoft.com,REJECT
  - DOMAIN-SUFFIX,vortex.data.microsoft.com,REJECT
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT

  # 强制 GitHub 走 AI 节点，防跳跃且解决配置规则下载超时问题
  - DOMAIN-SUFFIX,github.com,🤖 AI
  - DOMAIN-SUFFIX,githubusercontent.com,🤖 AI
  - DOMAIN-KEYWORD,github,🤖 AI

  - DOMAIN-SUFFIX,googleapis.com,🤖 AI
  - DOMAIN-SUFFIX,googleusercontent.com,🤖 AI
  - RULE-SET,google_domain,🤖 AI
  - RULE-SET,google_ip,🤖 AI
  - RULE-SET,ai,🤖 AI
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,onedrive_domain,🐬 OneDrive
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,apple_domain,🍎 Apple
  - RULE-SET,tiktok_domain,🎵 TikTok
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,spotify_domain,🎵 Spotify
  - RULE-SET,emby_domain,🎬 Emby
  - RULE-SET,netflix_ip,🎥 NETFLIX
  - RULE-SET,telegram_ip,📲 Telegram
  - RULE-SET,proxylite,🚀 默认代理
  - RULE-SET,geolocation-!cn,🚀 默认代理
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT
  - MATCH,🐟 漏网之鱼

