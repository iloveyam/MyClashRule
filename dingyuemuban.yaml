proxy-providers:
  Airport1:
    url: 
    type: http
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT
mixed-port: 7890
allow-lan: false
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: false
log-level: info
profile:
  store-selected: true
  store-fake-ip: true
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
        - 80
        - 443
      override-destination: false
    TLS:
      ports:
        - 443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - +.push.apple.com
  parse-pure-ip: true
  force-dns-mapping: true
  override-destination: false
  skip-dst-address:
    - 91.105.192.0/23
    - 91.108.4.0/22
    - 91.108.8.0/21
    - 91.108.16.0/21
    - 91.108.56.0/22
    - 95.161.64.0/20
    - 149.154.160.0/20
    - 185.76.151.0/24
    - 2001:67c:4e8::/48
    - 2001:b28:f23c::/47
    - 2001:b28:f23f::/48
    - 2a0a:f280:203::/48
tun:
  enable: false
  stack: mixed
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true
  device: Mihomo
  auto-redirect: false
  route-exclude-address: []
  mtu: 1500
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*"
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
  default-nameserver:
    - tls://223.5.5.5
  nameserver-policy:
    geosite:cn,private:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    geosite:geolocation-!cn:
      - https://8.8.8.8/dns-query
      - https://1.1.1.1/dns-query
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  use-hosts: false
  use-system-hosts: false
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver: []
  fallback: []
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com

proxy-groups:
  - name: 🧪 IPv6 测试
    type: url-test
    include-all: true
    url: https://ipv6.google.com/generate_204
    interval: 3600
  - name: 🚀 默认代理
    type: select
    proxies:
      - 🔯 香港故转
      - 🔯 日本故转
      - 🔯 狮城故转
      - 🔯 美国故转
      - ♻️ 香港自动
      - ♻️ 日本自动
      - ♻️ 狮城自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🌐 全部节点
      - DIRECT
  - name: 🤖 AI
    type: select
    proxies:
      - 🔯 狮城故转
      - 🔯 日本故转
      - 🔯 美国故转
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🌐 全部节点
      - DIRECT
  - name: 📹 YouTube
    type: select
    proxies:
      - 🔯 香港故转
      - 🔯 日本故转
      - 🔯 狮城故转
      - 🔯 美国故转
      - ♻️ 香港自动
      - ♻️ 日本自动
      - ♻️ 狮城自动
      - ♻️ 美国自动
      - ♻️ 自动选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🌐 全部节点
      - DIRECT
  - name: 🍎 Apple
    type: select
    proxies:
      - DIRECT
      - 🚀 默认代理
      - 🔯 香港故转
      - 🔯 日本故转
      - 🔯 狮城故转
