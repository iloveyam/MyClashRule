# ================= 基础配置 =================
allow-lan: true
bind-address: '*'
ipv6: true
unified-delay: true
tcp-concurrent: true
keep-alive-idle: 600
keep-alive-interval: 60
find-process-mode: strict
mode: rule # 确保默认是规则模式

external-controller: '0.0.0.0:9090'
external-ui: ui
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"

profile:
  store-selected: true
  store-fake-ip: true

# 注意：此处彻底删除了 tun 模块。请在 ShellCrash 的菜单中选择流量劫持模式（TProxy 或 Tun）。

# ================= 嗅探配置 (简化防干扰) =================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]

# ================= 稳定版 DNS =================
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.localdomain'
    - '*.example'
    - '*.invalid'
    - '*.localhost'
    - '*.test'
    - '*.local'
    - 'home.arpa'
    - '+.cn' # 国内直连域名不走 fake-ip
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://8.8.8.8/dns-query#默认代理
    - https://1.1.1.1/dns-query#默认代理
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

hosts:
  'services.googleapis.cn': [services.googleapis.com]
  '+.mcdn.bilivideo.com': [0.0.0.0]
  '+.mcdn.bilivideo.cn': [0.0.0.0]

# ================= 直连节点 =================
proxies:
  - name: "🇨🇳 直连 | IPv4优先"
    type: direct
    ip-version: ipv4-prefer
  - name: "🇨🇳 直连 | IPv6优先"
    type: direct
    ip-version: ipv6-prefer
  - name: "🇨🇳 直连 | 双栈"
    type: direct

# ================= 策略组 =================
proxy-groups:
  - name: GLOBAL
    type: select
    proxies:
      - 默认代理
      - 节点选择
      - 直连

  - name: 默认代理
    type: select
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png
    proxies:
      - 节点选择
      - 香港
      - 日本
      - 美国
      - 新加坡
      - 台湾省
      - 低倍率节点
      - 高倍率节点

  - name: 节点选择
    type: select
    include-all: true
    filter: '(?i)(港|🇭🇰|HK|Hong|日|🇯🇵|JP|Japan|美|🇺🇸|US|America|新|🇸🇬|SG|Singapore|台|🇹🇼|TW|Tai|倍)'
    exclude-filter: '(?i)群|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|备用|过期|已用|联系|邮箱|通知|防|剩余|维护|说明|提示|警告|⚠️'

  # --- IPv6 测速组 ---
  - name: IPv6测试
    type: select
    filter: '(?i)(港|🇭🇰|HK|Hong|日|🇯🇵|JP|Japan|美|🇺🇸|US|America|新|🇸🇬|SG|Singapore|台|🇹🇼|TW|Tai|倍)'
    exclude-filter: '(?i)群|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|备用|过期|已用|联系|邮箱|通知|防|剩余|维护|说明|提示|警告|⚠️'
    url: "http://ipv6.google.com/generate_204"
    interval: 3600
    icon: "https://github.com/DustinWin/ruleset_geodata/releases/download/icons/ipdb.png"

  # --- 核心功能策略组 ---
  - name: AI
    type: select
    proxies: [默认代理, 香港, 日本, 美国, 新加坡, 台湾省]
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png
  - name: YouTube
    type: select
    proxies: [默认代理, 香港, 日本, 美国, 新加坡, 台湾省]
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
  - name: Google
    type: select
    proxies: [默认代理, 香港, 日本, 美国, 新加坡, 台湾省]
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png
  - name: GitHub
    type: select
    proxies: [默认代理, 香港, 日本, 美国, 新加坡, 台湾省]
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png
  - name: Microsoft
    type: select
    proxies: [默认代理, 直连, 香港, 日本, 美国, 新加坡, 台湾省]
  - name: Apple
    type: select
    proxies: [默认代理, 直连, 香港, 日本, 美国, 新加坡, 台湾省]
  - name: Telegram
    type: select
    proxies: [默认代理, 香港, 日本, 美国, 新加坡, 台湾省]
  - name: 广告拦截
    type: select
    proxies: [REJECT, REJECT-DROP, PASS]
  - name: 下载专用
    type: select
    proxies: [直连, 默认代理]
  - name: 直连
    type: select
    proxies: ["🇨🇳 直连 | 双栈", "🇨🇳 直连 | IPv4优先", "🇨🇳 直连 | IPv6优先"]

  # --- 地区与倍率节点组 ---
  - name: 香港
    type: url-test
    tolerance: 50
    filter: "(?i)(港|🇭🇰|HK|Hong Kong)"
    exclude-filter: '(?i)群|剩余|到期|官网|流量'
  - name: 日本
    type: url-test
    tolerance: 50
    filter: "(?i)(日本|🇯🇵|JP|Japan)"
    exclude-filter: '(?i)群|剩余|到期|官网|流量'
  - name: 美国
    type: url-test
    tolerance: 50
    filter: "(?i)(美|🇺🇸|US|America|United States)"
    exclude-filter: '(?i)群|剩余|到期|官网|流量'
  - name: 新加坡
    type: url-test
    tolerance: 50
    filter: "(?i)(新加坡|狮城|🇸🇬|SG|Singapore)"
    exclude-filter: '(?i)群|剩余|到期|官网|流量'
  - name: 台湾省
    type: url-test
    tolerance: 50
    filter: "(?i)(台湾|🇹🇼|TW|Tai Wan)"
    exclude-filter: '(?i)群|剩余|到期|官网|流量'
 
  

# ================= 规则集 Providers =================
rule-providers:
  ai:
    type: http
    behavior: domain
    interval: 86400
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-ai-!cn.mrs"
    path: "./ruleset/ai.mrs"
  youtube:
    type: http
    behavior: domain
    interval: 86400
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/youtube.mrs"
    path: "./ruleset/youtube.mrs"
  google:
    type: http
    behavior: domain
    interval: 86400
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/google.mrs"
    path: "./ruleset/google.mrs"
  google_ip:
    type: http
    behavior: ipcidr
    interval: 86400
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/google.mrs"
    path: "./ruleset/google_ip.mrs"
  github:
    type: http
    behavior: domain
    interval: 86400
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/github.mrs"
    path: "./ruleset/github.mrs"
  telegram:
    type: http
    behavior: domain
    interval: 86400
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/telegram.mrs"
    path: "./ruleset/telegram.mrs"
  telegram_ip:
    type: http
    behavior: ipcidr
    interval: 86400
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/echs-top/proxy@main/rules/mrs/telegram_ip.mrs"
    path: "./ruleset/telegram_ip.mrs"
  gfw:
    type: http
    behavior: domain
    interval: 86400
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/gfw.mrs"
    path: "./ruleset/gfw.mrs"
  cn:
    type: http
    behavior: domain
    interval: 86400
    format: mrs
    url: "https://static-file-global.353355.xyz/rules/cn-additional-list.mrs"
    path: "./ruleset/cn.mrs"
  cn_ip:
    type: http
    behavior: ipcidr
    interval: 86400
    format: mrs
    url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/cn.mrs"
    path: "./ruleset/cn_ip.mrs"

# ================= 路由分流规则 =================
rules:
  # 局域网及特殊地址直连
  - DOMAIN-SUFFIX,local,直连
  - IP-CIDR,192.168.0.0/16,直连,no-resolve
  - IP-CIDR,10.0.0.0/8,直连,no-resolve
  - IP-CIDR,172.16.0.0/12,直连,no-resolve
  - IP-CIDR,127.0.0.0/8,直连,no-resolve
  - IP-CIDR,100.64.0.0/10,直连,no-resolve
  - IP-CIDR6,::1/128,直连,no-resolve
  - IP-CIDR6,fc00::/7,直连,no-resolve
  - IP-CIDR6,fe80::/10,直连,no-resolve
  - IP-CIDR6,fd00::/8,直连,no-resolve

  # 各项功能规则
  - RULE-SET,ai,AI
  - RULE-SET,youtube,YouTube
  - RULE-SET,google,Google
  - RULE-SET,google_ip,Google,no-resolve
  - RULE-SET,github,GitHub
  - RULE-SET,telegram,Telegram
  - RULE-SET,telegram_ip,Telegram,no-resolve

  # 兜底规则
  - RULE-SET,gfw,默认代理
  - RULE-SET,cn,直连
  - DOMAIN-WILDCARD,*.cn,直连
  - RULE-SET,cn_ip,直连
  - MATCH,默认代理
