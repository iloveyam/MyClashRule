# ================= 基础配置 =================
allow-lan: true
bind-address: '*'
ipv6: true
unified-delay: true
tcp-concurrent: true
keep-alive-idle: 600
keep-alive-interval: 60
find-process-mode: strict

external-controller: '[::]:9090'
external-ui: ui
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"

profile:
  store-selected: true
  store-fake-ip: true

# ================= 实验性功能 (TUN / Sniffer) =================
tun:
  enable: true
  stack: system
  auto-route: true
  # 针对局域网设备转发优化，关闭严格路由以防特定应用（如手机端AI应用上传文件）数据包被异常丢弃
  strict-route: false
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - udp://any:53
    - tcp://any:53

sniffer:
  enable: false
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - 'Mijia Cloud'
    - '+.oray.com'
    - '+.push.apple.com'
    - 'cloudflare-ech.com'
  skip-dst-address:
    - 'rule-set:telegram_ip'

# ================= NTP =================
ntp:
  enable: true
  write-to-system: false
  server: cn.ntp.org.cn

# ================= DNS =================
dns:
  enable: true
  ipv6: true
  listen: :1053
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range-v6: fc00::/18
  use-hosts: true
  use-system-hosts: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://1.1.1.1/dns-query#默认代理
    - https://8.8.8.8/dns-query#默认代理
  proxy-server-nameserver:
    - https://doh.pub/dns-query#DIRECT
    - https://dns.alidns.com/dns-query#DIRECT
  direct-nameserver:
    - system
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver-follow-policy: true
  nameserver-policy:
    '*': system
    '+.arpa': system
    '+.cn':
      - system
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    'rule-set:private,cn,googlefcm,steam_cn,epicgames,nvidia_cn,microsoft_cn,cloudflare_cn,microsoft,apple,spotify,captcha':
      - system
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
  fake-ip-filter:
    - '+.cn'
    - 'rule-set:category_ntp'
    - 'rule-set:fakeip_filter'
    - 'rule-set:connectivity_check'
    - 'rule-set:private'
    - 'rule-set:cn'
    - 'rule-set:googlefcm'
    - 'rule-set:steam_cn'
    - 'rule-set:epicgames'
    - 'rule-set:nvidia_cn'
    - 'rule-set:microsoft_cn'
    - 'rule-set:cloudflare_cn'

hosts:
  'dns.alidns.com': [223.5.5.5, 223.6.6.6]
  'doh.pub': [1.12.12.12, 120.53.53.53]
  'services.googleapis.cn': [services.googleapis.com]
  '+.mcdn.bilivideo.com': [0.0.0.0]
  '+.mcdn.bilivideo.cn': [0.0.0.0]

# ================= 代理节点集合 =================
# 在 ShellCrash 中，通常你的订阅会在此处生成代理列表。
# 使用锚点来定义全局排除规则，方便后续策略组复用。
p: &exclude "(?i)群|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|邀请|好友|失联|选择|剩余|公益|发布|DIZTNA|通路|登录|禁止|定时|渠道|牢记|永久|余额|阁下|本站|刷新|导航|⚠️|@|Expire|http|com"

proxies:
  - name: "🇨🇳 直连 | IPv4优先"
    type: direct
    ip-version: ipv4-prefer
  - name: "🇨🇳 直连 | IPv6优先"
    type: direct
    ip-version: ipv6-prefer
  - name: "🇨🇳 直连 | 双栈"
    type: direct

# ================= 策略组 =================
proxy-groups:

  - name: IPv6测试
    type: select
    include-all: true
    exclude-filter: *exclude
    url: "http://ipv6.google.com/generate_204"
    interval: 3600
    icon: "https://github.com/DustinWin/ruleset_geodata/releases/download/icons/ipdb.png"
  
